
<svg viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <defs>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000033"/>
    </filter>
    <filter id="shadowLight" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000022"/>
    </filter>

    <!-- Gradient for system boundary header -->
    <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1560AC"/>
      <stop offset="100%" stop-color="#0F4E96"/>
    </linearGradient>

    <!-- Gradient for ellipses -->
    <linearGradient id="ellipseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EDF4FF"/>
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
  </defs>

  <!-- ===== PAGE BACKGROUND ===== -->
  <rect width="820" height="480" fill="#F0F4F8"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="#C8D6E5"/>
  </pattern>
  <rect width="820" height="480" fill="url(#dots)"/>

  <!-- ===== SYSTEM BOUNDARY RECTANGLE ===== -->
  <!-- Shadow -->
  <rect x="213" y="53" width="394" height="374" rx="4" fill="#00000018"/>
  <!-- Main border -->
  <rect x="210" y="50" width="394" height="374" rx="4" fill="#FFFFFF" stroke="#1560AC" stroke-width="2" filter="url(#shadowLight)"/>

  <!-- Header tab -->
  <rect x="210" y="50" width="394" height="32" rx="4" fill="url(#headerGrad)"/>
  <rect x="210" y="66" width="394" height="16" fill="url(#headerGrad)"/>
  <!-- Header label -->
  <text x="407" y="71" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF" letter-spacing="0.5">Sistema de Pedidos</text>

  <!-- Stereotype label -->
  <text x="407" y="58" text-anchor="middle" font-size="9" fill="#BDD6FF" letter-spacing="1">«system»</text>

  <!-- ===== USE CASE 1: Cadastrar Cliente ===== -->
  <ellipse cx="407" cy="160" rx="104" ry="38" fill="#00000015"/>
  <ellipse cx="405" cy="158" rx="104" ry="38" fill="url(#ellipseGrad)" stroke="#1560AC" stroke-width="1.8" filter="url(#shadowLight)"/>
  <text x="405" y="153" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0D3B7A">Cadastrar</text>
  <text x="405" y="169" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0D3B7A">Cliente</text>

  <!-- ===== USE CASE 2: Registrar Pedido ===== -->
  <ellipse cx="407" cy="270" rx="104" ry="38" fill="#00000015"/>
  <ellipse cx="405" cy="268" rx="104" ry="38" fill="url(#ellipseGrad)" stroke="#1560AC" stroke-width="1.8" filter="url(#shadowLight)"/>
  <text x="405" y="263" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0D3B7A">Registrar</text>
  <text x="405" y="279" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0D3B7A">Pedido</text>

  <!-- ===== USE CASE 3: Consultar Status ===== -->
  <ellipse cx="407" cy="380" rx="104" ry="38" fill="#00000015"/>
  <ellipse cx="405" cy="378" rx="104" ry="38" fill="url(#ellipseGrad)" stroke="#1560AC" stroke-width="1.8" filter="url(#shadowLight)"/>
  <text x="405" y="373" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0D3B7A">Consultar</text>
  <text x="405" y="389" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0D3B7A">Status</text>

  <!-- ===== ACTOR: CLIENTE ===== -->
  <!-- Head -->
  <circle cx="95" cy="205" r="18" fill="#FFFFFF" stroke="#1560AC" stroke-width="2" filter="url(#shadow)"/>
  <!-- Face dots -->
  <circle cx="89" cy="202" r="1.5" fill="#1560AC"/>
  <circle cx="101" cy="202" r="1.5" fill="#1560AC"/>
  <path d="M89 210 Q95 215 101 210" stroke="#1560AC" stroke-width="1.5" fill="none"/>
  <!-- Neck -->
  <line x1="95" y1="223" x2="95" y2="233" stroke="#333" stroke-width="2"/>
  <!-- Body -->
  <line x1="95" y1="233" x2="95" y2="278" stroke="#333" stroke-width="2"/>
  <!-- Arms -->
  <line x1="62" y1="250" x2="128" y2="250" stroke="#333" stroke-width="2"/>
  <!-- Legs -->
  <line x1="95" y1="278" x2="70" y2="312" stroke="#333" stroke-width="2"/>
  <line x1="95" y1="278" x2="120" y2="312" stroke="#333" stroke-width="2"/>
  <!-- Name plate -->
  <rect x="55" y="322" width="80" height="22" rx="3" fill="#1560AC"/>
  <text x="95" y="337" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">Cliente</text>

  <!-- ===== ACTOR: FUNCIONÁRIO ===== -->
  <!-- Head -->
  <circle cx="720" cy="205" r="18" fill="#FFFFFF" stroke="#1560AC" stroke-width="2" filter="url(#shadow)"/>
  <!-- Face dots -->
  <circle cx="714" cy="202" r="1.5" fill="#1560AC"/>
  <circle cx="726" cy="202" r="1.5" fill="#1560AC"/>
  <path d="M714 210 Q720 215 726 210" stroke="#1560AC" stroke-width="1.5" fill="none"/>
  <!-- Neck -->
  <line x1="720" y1="223" x2="720" y2="233" stroke="#333" stroke-width="2"/>
  <!-- Body -->
  <line x1="720" y1="233" x2="720" y2="278" stroke="#333" stroke-width="2"/>
  <!-- Arms -->
  <line x1="687" y1="250" x2="753" y2="250" stroke="#333" stroke-width="2"/>
  <!-- Legs -->
  <line x1="720" y1="278" x2="695" y2="312" stroke="#333" stroke-width="2"/>
  <line x1="720" y1="278" x2="745" y2="312" stroke="#333" stroke-width="2"/>
  <!-- Name plate -->
  <rect x="666" y="322" width="108" height="22" rx="3" fill="#1560AC"/>
  <text x="720" y="337" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">Funcionário</text>

  <!-- ===== ASSOCIATION LINES ===== -->

  <!-- Cliente → Registrar Pedido -->
  <line x1="113" y1="247" x2="301" y2="265" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Cliente → Consultar Status -->
  <line x1="113" y1="258" x2="301" y2="368" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Funcionário → Cadastrar Cliente -->
  <line x1="702" y1="225" x2="509" y2="155" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Funcionário → Registrar Pedido -->
  <line x1="702" y1="247" x2="509" y2="265" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== LEGEND ===== -->
  <rect x="20" y="440" width="780" height="30" rx="4" fill="#FFFFFF" stroke="#CBD8E8" stroke-width="1"/>
  <!-- UC symbol -->
  <ellipse cx="50" cy="455" rx="22" ry="10" fill="url(#ellipseGrad)" stroke="#1560AC" stroke-width="1.5"/>
  <text x="78" y="459" font-size="10.5" fill="#333">Caso de Uso</text>
  <!-- Actor symbol -->
  <circle cx="165" cy="450" r="6" fill="#fff" stroke="#1560AC" stroke-width="1.5"/>
  <line x1="165" y1="456" x2="165" y2="462" stroke="#333" stroke-width="1.2"/>
  <text x="177" y="459" font-size="10.5" fill="#333">Ator</text>
  <!-- Association line -->
  <line x1="238" y1="455" x2="265" y2="455" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="272" y="459" font-size="10.5" fill="#333">Associação</text>
  <!-- System boundary -->
  <rect x="370" y="447" width="22" height="16" fill="#fff" stroke="#1560AC" stroke-width="1.5" rx="2"/>
  <rect x="370" y="447" width="22" height="5" rx="2" fill="url(#headerGrad)"/>
  <text x="398" y="459" font-size="10.5" fill="#333">Limite do Sistema</text>
  <!-- Stereotype note -->
  <text x="560" y="459" font-size="10" fill="#888" font-style="italic">«use case diagram» · Sistema de Pedidos · v1.0</text>
</svg>
