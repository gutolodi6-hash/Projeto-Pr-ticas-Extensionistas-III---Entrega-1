
<svg viewBox="0 0 740 580" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <filter id="sh"><feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000030"/></filter>
    <filter id="shLight"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000020"/></filter>
    <linearGradient id="hdrBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1560AC"/>
      <stop offset="100%" stop-color="#0F4E96"/>
    </linearGradient>
    <linearGradient id="actBox" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8DEFF"/>
      <stop offset="100%" stop-color="#A8CAFF"/>
    </linearGradient>
    <!-- Solid arrow (call) -->
    <marker id="arrSolid" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1560AC"/>
    </marker>
    <!-- Dashed arrow (return) -->
    <marker id="arrReturn" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E8B57"/>
    </marker>
    <!-- Open arrow (final return) -->
    <marker id="arrOpen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E07B39"/>
    </marker>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="740" height="580" fill="#F0F4F8"/>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="#C8D6E5"/>
  </pattern>
  <rect width="740" height="580" fill="url(#dots)"/>

  <!-- ===== TITLE ===== -->
  <text x="370" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#0D3B7A">Diagrama de Sequência — Registrar Pedido</text>
  <text x="370" y="43" text-anchor="middle" font-size="10" fill="#888" font-style="italic">«sequence diagram» · Sistema de Pedidos · v1.0</text>

  <!-- ================================================================
       LIFELINE POSITIONS:
         Funcionário  → x=130
         Interface    → x=370
         Sistema/DB   → x=610
  ================================================================ -->

  <!-- ===== PARTICIPANT: Funcionário (Actor box + stick figure) ===== -->
  <!-- Stick figure -->
  <circle cx="130" cy="82" r="16" fill="#FFFFFF" stroke="#1560AC" stroke-width="2" filter="url(#shLight)"/>
  <circle cx="124" cy="79" r="1.5" fill="#1560AC"/>
  <circle cx="136" cy="79" r="1.5" fill="#1560AC"/>
  <path d="M124 87 Q130 92 136 87" stroke="#1560AC" stroke-width="1.4" fill="none"/>
  <line x1="130" y1="98"  x2="130" y2="115" stroke="#333" stroke-width="2"/>
  <line x1="108" y1="108" x2="152" y2="108" stroke="#333" stroke-width="2"/>
  <line x1="130" y1="115" x2="112" y2="135" stroke="#333" stroke-width="2"/>
  <line x1="130" y1="115" x2="148" y2="135" stroke="#333" stroke-width="2"/>
  <!-- Label box -->
  <rect x="72" y="136" width="116" height="28" rx="4" fill="url(#hdrBlue)" filter="url(#shLight)"/>
  <text x="130" y="148" text-anchor="middle" font-size="9" fill="#BDD6FF">«actor»</text>
  <text x="130" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">Funcionário</text>

  <!-- ===== PARTICIPANT: Interface de Pedido ===== -->
  <rect x="272" y="65" width="196" height="100" rx="4" fill="#FFFFFF" stroke="#1560AC" stroke-width="1.8" filter="url(#sh)"/>
  <rect x="272" y="65" width="196" height="28" rx="4" fill="url(#hdrBlue)"/>
  <rect x="272" y="83" width="196" height="10" fill="url(#hdrBlue)"/>
  <text x="370" y="78" text-anchor="middle" font-size="9" fill="#BDD6FF">«boundary»</text>
  <text x="370" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">Interface de Pedido</text>
  <!-- Mini UI mockup -->
  <rect x="290" y="103" width="160" height="52" rx="3" fill="#EEF5FF" stroke="#A0BEE8" stroke-width="1"/>
  <rect x="298" y="110" width="80" height="8"  rx="2" fill="#C0D8FF"/>
  <rect x="298" y="122" width="60" height="8"  rx="2" fill="#C0D8FF"/>
  <rect x="298" y="134" width="40" height="12" rx="3" fill="#1560AC"/>
  <text x="318" y="144" text-anchor="middle" font-size="8" fill="#FFF">OK</text>

  <!-- ===== PARTICIPANT: Sistema / Banco de Dados ===== -->
  <rect x="512" y="65" width="196" height="100" rx="4" fill="#FFFFFF" stroke="#1560AC" stroke-width="1.8" filter="url(#sh)"/>
  <rect x="512" y="65" width="196" height="28" rx="4" fill="url(#hdrBlue)"/>
  <rect x="512" y="83" width="196" height="10" fill="url(#hdrBlue)"/>
  <text x="610" y="78" text-anchor="middle" font-size="9" fill="#BDD6FF">«database»</text>
  <text x="610" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">Sistema / BD</text>
  <!-- DB cylinder icon -->
  <ellipse cx="610" cy="108" rx="36" ry="10" fill="#DCEEFF" stroke="#1560AC" stroke-width="1.2"/>
  <rect x="574" y="108" width="72" height="36" fill="#DCEEFF" stroke="#1560AC" stroke-width="1.2"/>
  <ellipse cx="610" cy="144" rx="36" ry="10" fill="#C4D8F8" stroke="#1560AC" stroke-width="1.2"/>
  <ellipse cx="610" cy="120" rx="36" ry="10" fill="#DCEEFF" stroke="#1560AC" stroke-width="1.2"/>

  <!-- ================================================================
       LIFELINES (dashed vertical)
  ================================================================ -->
  <line x1="130" y1="165" x2="130" y2="530" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="370" y1="165" x2="370" y2="530" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="610" y1="165" x2="610" y2="530" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ================================================================
       ACTIVATION BOXES (execução)
  ================================================================ -->
  <!-- Funcionário active: msgs 1 and 4 -->
  <rect x="124" y="220" width="12" height="40"  fill="url(#actBox)" stroke="#1560AC" stroke-width="1"/>
  <rect x="124" y="430" width="12" height="40"  fill="url(#actBox)" stroke="#1560AC" stroke-width="1"/>

  <!-- Interface active: msgs 1→4 -->
  <rect x="364" y="220" width="12" height="250" fill="url(#actBox)" stroke="#1560AC" stroke-width="1"/>

  <!-- Sistema active: msgs 2→3 -->
  <rect x="604" y="300" width="12" height="100" fill="url(#actBox)" stroke="#1560AC" stroke-width="1"/>

  <!-- ================================================================
       SEQUENCE NUMBERS + HORIZONTAL ARROWS
  ================================================================ -->

  <!-- seq number badge -->
  <!-- Badge helper: drawn per message -->

  <!-- MSG 1: Funcionário → Interface : inserirDadosPedido() -->
  <line x1="136" y1="240" x2="364" y2="240" stroke="#1560AC" stroke-width="2" marker-end="url(#arrSolid)"/>
  <!-- seq badge -->
  <circle cx="148" cy="240" r="9" fill="#1560AC"/>
  <text x="148" y="244" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">1</text>
  <!-- label -->
  <rect x="180" y="224" width="164" height="18" rx="3" fill="#FFFFFF" stroke="#1560AC" stroke-width="1" opacity="0.92"/>
  <text x="262" y="237" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#0D3B7A">inserirDadosPedido()</text>

  <!-- MSG 2: Interface → Sistema : salvarPedido() -->
  <line x1="376" y1="310" x2="604" y2="310" stroke="#1560AC" stroke-width="2" marker-end="url(#arrSolid)"/>
  <circle cx="390" cy="310" r="9" fill="#1560AC"/>
  <text x="390" y="314" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">2</text>
  <rect x="416" y="294" width="144" height="18" rx="3" fill="#FFFFFF" stroke="#1560AC" stroke-width="1" opacity="0.92"/>
  <text x="488" y="307" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#0D3B7A">salvarPedido()</text>

  <!-- MSG 3: Sistema → Interface : confirmarSucesso() [dashed return] -->
  <line x1="604" y1="390" x2="376" y2="390" stroke="#2E8B57" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arrReturn)"/>
  <circle cx="590" cy="390" r="9" fill="#2E8B57"/>
  <text x="590" y="394" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">3</text>
  <rect x="416" y="374" width="148" height="18" rx="3" fill="#E8F8F0" stroke="#2E8B57" stroke-width="1" opacity="0.95"/>
  <text x="490" y="387" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1B6E3A">confirmarSucesso()</text>
  <!-- small return icon -->
  <text x="352" y="386" font-size="9" fill="#2E8B57" font-style="italic">«return»</text>

  <!-- MSG 4: Interface → Funcionário : exibirMensagemOk() [dashed return] -->
  <line x1="364" y1="450" x2="136" y2="450" stroke="#E07B39" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arrOpen)"/>
  <circle cx="348" cy="450" r="9" fill="#E07B39"/>
  <text x="348" y="454" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">4</text>
  <rect x="152" y="434" width="168" height="18" rx="3" fill="#FFF4EC" stroke="#E07B39" stroke-width="1" opacity="0.95"/>
  <text x="236" y="447" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#7A3000">exibirMensagemOk()</text>
  <text x="372" y="446" font-size="9" fill="#E07B39" font-style="italic">«return»</text>

  <!-- ================================================================
       TIME ARROW (left side)
  ================================================================ -->
  <line x1="20" y1="170" x2="20" y2="510" stroke="#999" stroke-width="1.5" marker-end="url(#arrSolid)"/>
  <text x="14" y="340" text-anchor="middle" font-size="10" fill="#888" font-weight="bold" transform="rotate(-90,14,340)">tempo</text>

  <!-- ================================================================
       DESTRUCTION / END marks
  ================================================================ -->
  <line x1="122" y1="525" x2="138" y2="539" stroke="#888" stroke-width="2"/>
  <line x1="138" y1="525" x2="122" y2="539" stroke="#888" stroke-width="2"/>
  <line x1="362" y1="525" x2="378" y2="539" stroke="#888" stroke-width="2"/>
  <line x1="378" y1="525" x2="362" y2="539" stroke="#888" stroke-width="2"/>
  <line x1="602" y1="525" x2="618" y2="539" stroke="#888" stroke-width="2"/>
  <line x1="618" y1="525" x2="602" y2="539" stroke="#888" stroke-width="2"/>

  <!-- ================================================================
       LEGEND
  ================================================================ -->
  <rect x="20" y="548" width="700" height="24" rx="4" fill="#FFFFFF" stroke="#CBD8E8" stroke-width="1"/>
  <!-- solid call -->
  <line x1="34" y1="560" x2="60" y2="560" stroke="#1560AC" stroke-width="2" marker-end="url(#arrSolid)"/>
  <text x="66" y="564" font-size="10" fill="#333">Chamada (call)</text>
  <!-- dashed return -->
  <line x1="185" y1="560" x2="211" y2="560" stroke="#2E8B57" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrReturn)"/>
  <text x="217" y="564" font-size="10" fill="#333">Retorno (return)</text>
  <!-- activation box -->
  <rect x="338" y="552" width="8" height="16" fill="url(#actBox)" stroke="#1560AC" stroke-width="1"/>
  <text x="352" y="564" font-size="10" fill="#333">Ativação</text>
  <!-- lifeline -->
  <line x1="430" y1="560" x2="456" y2="560" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="462" y="564" font-size="10" fill="#333">Linha de vida</text>
  <!-- end mark -->
  <line x1="568" y1="554" x2="580" y2="566" stroke="#888" stroke-width="2"/>
  <line x1="580" y1="554" x2="568" y2="566" stroke="#888" stroke-width="2"/>
  <text x="588" y="564" font-size="10" fill="#333">Fim</text>
</svg>
